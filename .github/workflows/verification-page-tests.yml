name: Verification Page Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'verification-page/**'
      - '.github/workflows/verification-page-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'verification-page/**'
      - '.github/workflows/verification-page-tests.yml'

permissions:
  contents: read

concurrency:
  group: verification-page-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verification-page:
    runs-on: ubuntu-latest
    name: Validate Verification Page

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect verification page
        id: verification-page
        run: |
          if test -d verification-page; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify required files exist
        if: steps.verification-page.outputs.exists == 'true'
        run: |
          test -f verification-page/verification.html
          test -f verification-page/verification.js
          test -f verification-page/verification.css
          test -f verification-page/merkleUtils.js
          test -f verification-page/blockchainClient.js

      - name: Check JavaScript syntax
        if: steps.verification-page.outputs.exists == 'true'
        run: |
          node --check verification-page/verification.js
          node --check verification-page/merkleUtils.js
          node --check verification-page/blockchainClient.js

      - name: Check page references current assets
        if: steps.verification-page.outputs.exists == 'true'
        run: |
          grep -Fq 'href="verification.css"' verification-page/verification.html
          grep -Fq 'src="merkleUtils.js"' verification-page/verification.html
          grep -Fq 'src="blockchainClient.js"' verification-page/verification.html
          grep -Fq 'src="verification.js"' verification-page/verification.html

      - name: Check planned verifier functions exist
        if: steps.verification-page.outputs.exists == 'true'
        run: |
          grep -Eq 'function[[:space:]]+parseProofPackageInput|const[[:space:]]+parseProofPackageInput[[:space:]]*=' verification-page/verification.js
          grep -Eq 'function[[:space:]]+validateProofPackage|const[[:space:]]+validateProofPackage[[:space:]]*=' verification-page/verification.js
          grep -Eq 'function[[:space:]]+verifyProofPackage|const[[:space:]]+verifyProofPackage[[:space:]]*=' verification-page/verification.js
          grep -Eq 'canonicaliseEnvelope' verification-page/verification.js
          grep -Eq 'computeEnvelopeHash' verification-page/verification.js
          grep -Eq 'verifyMerkleProof' verification-page/verification.js
          grep -Eq 'fetchSegmentRecord' verification-page/verification.js
