name: Verification Page Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'verification-page/**'
      - '.github/workflows/verification-page-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'verification-page/**'
      - '.github/workflows/verification-page-tests.yml'

permissions:
  contents: read

concurrency:
  group: verification-page-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verification-page:
    runs-on: ubuntu-latest
    name: Validate Verification Page

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect verification page
        id: verification-page
        run: |
          if test -d verification-page; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify required files exist
        if: steps.verification-page.outputs.exists == 'true'
        run: |
          test -f verification-page/index.html
          test -f verification-page/verify.js
          test -f verification-page/style.css
          test -f verification-page/README.md

      - name: Check JavaScript syntax
        if: steps.verification-page.outputs.exists == 'true'
        run: node --check verification-page/verify.js

      - name: Check page references verifier script
        if: steps.verification-page.outputs.exists == 'true'
        run: grep -Eq 'src=["'\'']\.?/verify\.js["'\'']' verification-page/index.html

      - name: Check planned verifier functions exist
        if: steps.verification-page.outputs.exists == 'true'
        run: |
          grep -Eq 'function[[:space:]]+getQueryParams|const[[:space:]]+getQueryParams[[:space:]]*=' verification-page/verify.js
          grep -Eq 'function[[:space:]]+fetchEnvelope|const[[:space:]]+fetchEnvelope[[:space:]]*=' verification-page/verify.js
          grep -Eq 'function[[:space:]]+fetchBackendProof|const[[:space:]]+fetchBackendProof[[:space:]]*=' verification-page/verify.js
          grep -Eq 'function[[:space:]]+canonicaliseEnvelope|const[[:space:]]+canonicaliseEnvelope[[:space:]]*=' verification-page/verify.js
          grep -Eq 'function[[:space:]]+computeEnvelopeDigest|const[[:space:]]+computeEnvelopeDigest[[:space:]]*=' verification-page/verify.js
          grep -Eq 'function[[:space:]]+getContract|const[[:space:]]+getContract[[:space:]]*=' verification-page/verify.js
          grep -Eq 'function[[:space:]]+fetchOnChainRecord|const[[:space:]]+fetchOnChainRecord[[:space:]]*=' verification-page/verify.js
          grep -Eq 'function[[:space:]]+verifyMessageAutomatically|const[[:space:]]+verifyMessageAutomatically[[:space:]]*=' verification-page/verify.js
          grep -Eq 'function[[:space:]]+displayResult|const[[:space:]]+displayResult[[:space:]]*=' verification-page/verify.js
