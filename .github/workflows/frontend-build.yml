name: Frontend Build Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'verification-page/**'
      - 'Testing/**'
      - 'contracts/**'
      - 'scripts/**'
      - 'config.example.js'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'index.html'
      - '.storybook/**'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'verification-page/**'
      - 'Testing/**'
      - 'contracts/**'
      - 'scripts/**'
      - 'config.example.js'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'index.html'
      - '.storybook/**'
      - '.github/workflows/frontend-build.yml'

permissions:
  contents: read

concurrency:
  group: frontend-build-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Validate Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect frontend project
        id: frontend-project
        run: |
          if test -f package.json; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.frontend-project.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies from lockfile
        if: steps.frontend-project.outputs.exists == 'true' && hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Install dependencies
        if: steps.frontend-project.outputs.exists == 'true' && hashFiles('package-lock.json') == ''
        run: npm install

      - name: Type check
        if: steps.frontend-project.outputs.exists == 'true'
        run: npm run --if-present typecheck

      - name: Build application
        if: steps.frontend-project.outputs.exists == 'true'
        run: npm run build

      - name: Verify build output
        if: steps.frontend-project.outputs.exists == 'true'
        run: |
          test -d dist
          test -f dist/verification-page/verification.html
          test -f dist/verification-page/verification.js
          test -f dist/verification-page/verification.css
          test -f dist/verification-page/merkleUtils.js
          test -f dist/verification-page/blockchainClient.js

      - name: Build Storybook
        if: steps.frontend-project.outputs.exists == 'true'
        run: npm run --if-present build-storybook

      - name: Upload application build
        if: steps.frontend-project.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

      - name: Upload Storybook build
        uses: actions/upload-artifact@v4
        if: steps.frontend-project.outputs.exists == 'true' && hashFiles('storybook-static/**') != ''
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 7
