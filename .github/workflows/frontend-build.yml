name: Frontend Build Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'index.html'
      - '.storybook/**'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'index.html'
      - '.storybook/**'
      - '.github/workflows/frontend-build.yml'

permissions:
  contents: read

concurrency:
  group: frontend-build-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Validate Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run --if-present typecheck

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: test -d dist && test -f dist/index.html

      - name: Build Storybook
        run: npm run --if-present build-storybook

      - name: Upload application build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

      - name: Upload Storybook build
        uses: actions/upload-artifact@v4
        if: hashFiles('storybook-static/**') != ''
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 7
