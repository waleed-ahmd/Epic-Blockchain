name: Frontend Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/frontend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Frontend Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect frontend project
        id: frontend-project
        run: |
          if test -f package.json; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.frontend-project.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.frontend-project.outputs.exists == 'true'
        run: npm ci

      - name: Run tests
        if: steps.frontend-project.outputs.exists == 'true'
        run: npm test
