name: Smart Contract Remix Build Checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'contracts/**'
      - 'abi/**'
      - 'remix/**'
      - 'scripts/**'
      - '.github/workflows/blockchain-build-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'contracts/**'
      - 'abi/**'
      - 'remix/**'
      - 'scripts/**'
      - '.github/workflows/blockchain-build-tests.yml'

permissions:
  contents: read

concurrency:
  group: blockchain-build-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  blockchain:
    runs-on: ubuntu-latest
    name: Validate Remix Smart Contract Files

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect smart contract project
        id: contract-project
        run: |
          if test -d contracts; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify required contract files
        if: steps.contract-project.outputs.exists == 'true'
        run: |
          test -f contracts/MessageIntegrity.sol

      - name: Ensure real environment files are not committed
        if: steps.contract-project.outputs.exists == 'true'
        run: |
          test ! -f .env
          test ! -f .env.local

      - name: Validate segment-root contract interface
        if: steps.contract-project.outputs.exists == 'true'
        run: |
          grep -Eq 'contract[[:space:]]+MessageIntegrity' contracts/MessageIntegrity.sol
          grep -Eq 'struct[[:space:]]+SegmentRecord' contracts/MessageIntegrity.sol
          grep -Eq 'function[[:space:]]+recordSegmentRoot[[:space:]]*\(' contracts/MessageIntegrity.sol
          grep -Eq 'function[[:space:]]+getRecord[[:space:]]*\([[:space:]]*uint256[[:space:]]+recordId[[:space:]]*\)' contracts/MessageIntegrity.sol
          grep -Eq 'function[[:space:]]+getRecordCount[[:space:]]*\(' contracts/MessageIntegrity.sol
          grep -Eq 'event[[:space:]]+SegmentRootRecorded[[:space:]]*\(' contracts/MessageIntegrity.sol
          grep -Eq 'require[[:space:]]*\([[:space:]]*segmentRoot[[:space:]]*!=[[:space:]]*bytes32[[:space:]]*\([[:space:]]*0[[:space:]]*\)' contracts/MessageIntegrity.sol
          grep -Eq 'require[[:space:]]*\([[:space:]]*messageCount[[:space:]]*>[[:space:]]*0' contracts/MessageIntegrity.sol
          grep -Eq 'require[[:space:]]*\([[:space:]]*messageCount[[:space:]]*<=[[:space:]]*5' contracts/MessageIntegrity.sol

      - name: Validate Remix deployment notes
        if: steps.contract-project.outputs.exists == 'true' && hashFiles('remix/deployment-notes.md') != ''
        run: |
          grep -Eq 'contract_address' remix/deployment-notes.md
          grep -Eq 'deployment_transaction_hash' remix/deployment-notes.md
          grep -Eq 'network_name[[:space:]]*=?[[:space:]]*sepolia|sepolia' remix/deployment-notes.md
          grep -Eq 'chain_id[[:space:]]*=?[[:space:]]*11155111|11155111' remix/deployment-notes.md

      - name: Setup Node.js
        if: steps.contract-project.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies from lockfile
        if: steps.contract-project.outputs.exists == 'true' && hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Install dependencies
        if: steps.contract-project.outputs.exists == 'true' && hashFiles('package.json') != '' && hashFiles('package-lock.json') == ''
        run: npm install

      - name: Compile contracts with solc
        if: steps.contract-project.outputs.exists == 'true'
        run: |
          mkdir -p build/solc
          npx --yes solc@0.8.24 --bin --abi contracts/*.sol -o build/solc

      - name: Validate ABI JSON
        if: steps.contract-project.outputs.exists == 'true' && hashFiles('abi/MessageIntegrity.json') != ''
        run: node -e "JSON.parse(require('fs').readFileSync('abi/MessageIntegrity.json', 'utf8'))"

      - name: Check recording script syntax
        if: steps.contract-project.outputs.exists == 'true' && hashFiles('scripts/recordDigest.js') != ''
        run: node --check scripts/recordDigest.js

      - name: Run optional contract tests
        if: steps.contract-project.outputs.exists == 'true' && hashFiles('package.json') != ''
        run: npm run --if-present test

      - name: Upload compiled ABI and bytecode
        uses: actions/upload-artifact@v4
        if: steps.contract-project.outputs.exists == 'true' && hashFiles('build/solc/**') != ''
        with:
          name: blockchain-solc-artifacts
          path: build/solc/
          retention-days: 7
