name: Frontend Linting

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'verification-page/**'
      - 'Testing/**'
      - 'scripts/**'
      - 'eslint.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/frontend-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Run ESLint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect frontend project
        id: frontend-project
        run: |
          if test -f package.json; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.frontend-project.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies from lockfile
        if: steps.frontend-project.outputs.exists == 'true' && hashFiles('package-lock.json') != ''
        run: npm ci

      - name: Install dependencies
        if: steps.frontend-project.outputs.exists == 'true' && hashFiles('package-lock.json') == ''
        run: npm install

      - name: Run linter
        if: steps.frontend-project.outputs.exists == 'true'
        run: npm run --if-present lint
