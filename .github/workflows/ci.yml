name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build verification web app
        run: npm run build

      - name: Validate ABI
        run: node -e "JSON.parse(require('fs').readFileSync('abi/contracts/MessageIntegrity.sol/MessageIntegrity.json', 'utf8')).abi"

      - name: Audit dependencies
        run: npm audit --audit-level=low
