name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Type check
        run: npx tsc --noEmit

      - name: Check browser JavaScript syntax
        run: |
          node --check verification-page/verification.js
          node --check verification-page/digestUtils.js
          node --check verification-page/blockchainClient.js

      - name: Validate ABI
        run: node -e "JSON.parse(require('fs').readFileSync('abi/contracts/MessageIntegrity.sol/MessageIntegrity.json', 'utf8')).abi"

      - name: Run tests
        run: npx hardhat test

      - name: Audit dependencies
        run: npm audit --audit-level=low
