name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Compile contracts
        run: npx hardhat compile

      - name: Validate ABI
        run: node -e "JSON.parse(require('fs').readFileSync('artifacts/contracts/MessageIntegrity.sol/MessageIntegrity.json', 'utf8')).abi"

      - name: Run tests
        run: npx hardhat test

      - name: Audit dependencies
        run: npm audit --audit-level=low
